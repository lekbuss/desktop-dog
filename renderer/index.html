<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>豆豆</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 状态面板（左键单击呼出） -->
  <div id="status-panel" class="status-panel hidden">
    <div class="status-title">豆豆的状态</div>
    <div class="stat-row">
      <span class="stat-icon">🍖</span>
      <div class="stat-track"><div class="stat-fill" id="bar-hunger"></div></div>
      <span class="stat-num" id="num-hunger">100</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">💧</span>
      <div class="stat-track"><div class="stat-fill" id="bar-water"></div></div>
      <span class="stat-num" id="num-water">100</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">😊</span>
      <div class="stat-track"><div class="stat-fill" id="bar-mood"></div></div>
      <span class="stat-num" id="num-mood">100</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">⚡</span>
      <div class="stat-track"><div class="stat-fill" id="bar-energy"></div></div>
      <span class="stat-num" id="num-energy">100</span>
    </div>
  </div>

  <div id="bubble" class="bubble hidden"><span id="bubble-text"></span></div>
  <div id="dog-wrapper">
    <div id="dog-inner">
      <svg id="dog-svg" width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">

        <!-- 尾巴 -->
        <g id="tail" style="transform-origin:70px 66px">
          <path d="M68 66 Q82 56 80 44 Q78 38 73 44 Q78 52 68 62Z" fill="#C8915A"/>
        </g>

        <!-- 身体 -->
        <ellipse id="body" cx="48" cy="72" rx="26" ry="13" fill="#C8915A"/>

        <!-- 后腿 -->
        <ellipse id="leg-bl" cx="36" cy="79" rx="6" ry="5" fill="#C8915A"/>
        <ellipse id="leg-br" cx="60" cy="79" rx="6" ry="5" fill="#C8915A"/>

        <!-- 前腿 -->
        <ellipse id="leg-fl" cx="38" cy="60" rx="5.5" ry="9" fill="#C8915A"/>
        <ellipse id="leg-fr" cx="58" cy="60" rx="5.5" ry="9" fill="#C8915A"/>

        <!-- 腹部白毛 -->
        <ellipse cx="48" cy="65" rx="16" ry="9" fill="#F0D8B0"/>

        <!-- 头部 -->
        <g id="head">
          <!-- 耳朵 -->
          <ellipse id="ear-l" cx="34" cy="37" rx="9" ry="12" fill="#C8915A" style="transform-origin:34px 37px"/>
          <ellipse id="ear-r" cx="62" cy="37" rx="9" ry="12" fill="#C8915A" style="transform-origin:62px 37px"/>
          <ellipse cx="34" cy="36" rx="6" ry="8" fill="#8B4020"/>
          <ellipse cx="62" cy="36" rx="6" ry="8" fill="#8B4020"/>

          <!-- 脑袋 -->
          <ellipse cx="48" cy="49" rx="18" ry="17" fill="#D4A06A"/>
          <!-- 脸部白毛 -->
          <ellipse cx="48" cy="53" rx="12" ry="8" fill="#F0D8B0"/>

          <!-- 眼睛 -->
          <circle id="eye-l" cx="42" cy="45" r="4" fill="#2a1a0a"/>
          <circle id="eye-r" cx="54" cy="45" r="4" fill="#2a1a0a"/>
          <circle cx="43" cy="44" r="1.5" fill="white"/>
          <circle cx="55" cy="44" r="1.5" fill="white"/>

          <!-- 闭眼（睡觉/难过用） -->
          <path id="eye-closed-l" d="M38 45 Q42 47 46 45" fill="none" stroke="#2a1a0a" stroke-width="2.5" stroke-linecap="round" visibility="hidden"/>
          <path id="eye-closed-r" d="M50 45 Q54 47 58 45" fill="none" stroke="#2a1a0a" stroke-width="2.5" stroke-linecap="round" visibility="hidden"/>

          <!-- 鼻子 -->
          <ellipse cx="48" cy="52" rx="5" ry="3.5" fill="#C06040"/>
          <ellipse cx="48" cy="54" rx="3" ry="1.5" fill="#8B3020"/>

          <!-- 嘴巴（开心） -->
          <path id="mouth-happy" d="M44 57 Q48 61 52 57" fill="none" stroke="#8B3020" stroke-width="1.3" stroke-linecap="round"/>
          <!-- 嘴巴（难过） -->
          <path id="mouth-sad" d="M44 59 Q48 55 52 59" fill="none" stroke="#8B3020" stroke-width="1.3" stroke-linecap="round" visibility="hidden"/>
          <!-- 吐舌头（奔跑/吃东西） -->
          <ellipse id="tongue" cx="48" cy="59" rx="4" ry="3" fill="#E05050" visibility="hidden"/>

          <!-- 叫的文字 -->
          <text id="bark-text" x="63" y="30" font-size="10" fill="#C8915A" font-family="sans-serif" font-weight="bold" visibility="hidden">汪!</text>
        </g>

        <!-- 睡觉 zzz -->
        <g id="zzz" visibility="hidden">
          <text id="z1" x="62" y="36" font-size="10" fill="#7090C0" font-family="sans-serif" font-weight="bold">z</text>
          <text id="z2" x="68" y="27" font-size="8" fill="#7090C0" font-family="sans-serif" font-weight="bold">z</text>
          <text id="z3" x="73" y="20" font-size="6" fill="#7090C0" font-family="sans-serif" font-weight="bold">z</text>
        </g>

        <!-- 抚摸爱心 -->
        <g id="pet-hearts" visibility="hidden">
          <text id="heart1" x="58" y="32" font-size="12" font-family="sans-serif">♥</text>
          <text id="heart2" x="66" y="22" font-size="9"  font-family="sans-serif">♥</text>
        </g>

      </svg>
    </div>
  </div>
  <script src="pet.js"></script>
  <script src="chat.js"></script>
</body>
</html>
